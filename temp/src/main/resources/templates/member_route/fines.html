<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Fines</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1>My Fines</h1>

        <button
            class="btn btn-secondary"
            onclick="window.location.href='/member/dashboard'">
            Back
        </button>

    </div>

    <table class="table table-bordered table-striped">

        <thead>
            <tr>
                <th>Booking ID</th>
                <th>Amount</th>
                <th>Paid</th>
            </tr>
        </thead>

        <tbody id="fineTableBody">

        </tbody>

    </table>

</div>

<script>

async function loadFines() {

    const user =
        JSON.parse(
            localStorage.getItem("loggedUser")
        );

    const response =
        await fetch(
            "/fine/user/" + user.id
        );

    const fines =
        await response.json();

    const tbody =
        document.getElementById("fineTableBody");

    tbody.innerHTML = "";

    fines.forEach(fine => {

        tbody.innerHTML += `
            <tr>
                <td>${fine.booking.id}</td>
                <td>${fine.amount}</td>
                <td>${fine.paid}</td>
            </tr>
        `;
    });

}

loadFines();

</script>

</body>
</html>
