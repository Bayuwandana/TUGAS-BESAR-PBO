<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fines Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1>Fines Management</h1>

        <button
            class="btn btn-secondary"
            onclick="window.location.href='/admin/dashboard'">
            Back
        </button>

    </div>

    <table class="table table-bordered table-striped">

        <thead>
            <tr>
                <th>ID</th>
                <th>Booking ID</th>
                <th>Amount</th>
                <th>Paid</th>
                <th width="220">Action</th>
            </tr>
        </thead>

        <tbody id="fineTableBody">

        </tbody>

    </table>

</div>

<script>

async function loadFines() {

    const response = await fetch("/fine/all");

    const fines = await response.json();

    const tbody = document.getElementById("fineTableBody");

    tbody.innerHTML = "";

    fines.forEach(fine => {

        let action = "";

        if(fine.paid){

            action = `
                <span class="badge bg-success">
                    Paid
                </span>
            `;

        }else{

            action = `
                <button
                    class="btn btn-success btn-sm me-2"
                    onclick="payFine(${fine.id})">
                    Pay
                </button>

                <button
                    class="btn btn-danger btn-sm"
                    onclick="lostBook(${fine.id})">
                    Book Lost
                </button>
            `;

        }

        tbody.innerHTML += `
            <tr>
                <td>${fine.id}</td>
                <td>${fine.booking.id}</td>
                <td>Rp ${fine.amount}</td>
                <td>${fine.paid ? "Yes" : "No"}</td>
                <td>${action}</td>
            </tr>
        `;

    });

}

async function payFine(id){

    const response = await fetch("/fine/pay/" + id,{
        method:"PUT"
    });

    if(response.ok){

        alert("Fine Paid");

        loadFines();

    }else{

        alert("Failed");

    }

}

async function lostBook(id){

    if(!confirm("Add lost book penalty?")){
        return;
    }

    const response = await fetch("/fine/lost/" + id,{
        method:"PUT"
    });

    if(response.ok){

        alert("Lost Book Fee Added");

        loadFines();

    }else{

        alert("Failed");

    }

}

loadFines();

</script>

</body>
</html>
