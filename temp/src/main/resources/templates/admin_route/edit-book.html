<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Stock</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h2>Edit Book Stock</h2>

            <div class="mb-3">
                <label>Stock</label>
                <input
                    type="number"
                    id="stock"
                    class="form-control">
            </div>

            <button
                class="btn btn-primary"
                onclick="saveBook()">
                Save
            </button>

            <button
                class="btn btn-secondary"
                onclick="window.location.href='/admin/books'">
                Cancel
            </button>

        </div>

    </div>

</div>

<script>

const id =
window.location.pathname.split("/").pop();

async function loadBook() {

    const response =
    await fetch("/book/" + id);

    const book =
    await response.json();

    document.getElementById("stock").value =
    book.stock;
}

async function saveBook() {

    const oldResponse =
    await fetch("/book/" + id);

    const book =
    await oldResponse.json();

    book.stock =
    parseInt(document.getElementById("stock").value);

    const response =
    await fetch("/book/update/" + id, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(book)
    });

    if(response.ok){

        alert("Stock Updated");

        window.location.href =
        "/admin/books";

    }else{

        alert("Update Failed");

    }
}

loadBook();

</script>

</body>
</html>
