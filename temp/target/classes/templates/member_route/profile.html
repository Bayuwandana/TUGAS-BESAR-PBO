<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <div class="d-flex justify-content-between mb-4">

                <h2>My Profile</h2>

                <button
                    class="btn btn-secondary"
                    onclick="window.location.href='/member/dashboard'">
                    Back
                </button>

            </div>

            <div class="mb-3">
                <label>Name</label>
                <input
                    type="text"
                    id="name"
                    class="form-control">
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input
                    type="email"
                    id="email"
                    class="form-control"
                    disabled>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input
                    type="password"
                    id="password"
                    class="form-control">
            </div>

            <button
                class="btn btn-primary"
                onclick="saveProfile()">
                Save Changes
            </button>

        </div>

    </div>

</div>

<script>

const user =
    JSON.parse(
        localStorage.getItem("loggedUser")
    );

async function loadProfile() {

    const response =
        await fetch("/user/" + user.id);

    const currentUser =
        await response.json();

    document.getElementById("name").value =
        currentUser.name;

    document.getElementById("email").value =
        currentUser.email;

    document.getElementById("password").value =
        currentUser.password;
}

async function saveProfile() {

    const response =
        await fetch("/user/update/" + user.id, {

            method: "PUT",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({

                name:
                    document.getElementById("name").value,

                email:
                    document.getElementById("email").value,

                password:
                    document.getElementById("password").value

            })
        });

    if(response.ok){

        alert("Profile Updated");

        const updatedUser =
            await response.json();

        localStorage.setItem(
            "loggedUser",
            JSON.stringify(updatedUser)
        );

    }else{

        alert("Update Failed");

    }
}

loadProfile();

</script>

</body>
</html>
