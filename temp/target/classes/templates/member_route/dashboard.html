<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-5">
        Member Dashboard
    </h1>

    <div class="row g-4">

        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body text-center">

                    <h3>Browse Books</h3>

                    <button
                        class="btn btn-primary mt-3"
                        onclick="window.location.href='/member/books'">
                        Open
                    </button>

                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body text-center">

                    <h3>My Borrowings</h3>

                    <button
                        class="btn btn-success mt-3"
                        onclick="window.location.href='/member/bookings'">
                        Open
                    </button>

                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body text-center">

                    <h3>My Fines</h3>

                    <button
                        class="btn btn-warning mt-3"
                        onclick="window.location.href='/member/fines'">
                        Open
                    </button>

                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body text-center">

                    <h3>Profile</h3>

                    <button
                        class="btn btn-info mt-3"
                        onclick="window.location.href='/member/profile'">
                        Open
                    </button>

                </div>
            </div>
        </div>

        <div class="col-md-12">
            <div class="card shadow">
                <div class="card-body text-center">

                    <h3>Logout</h3>

                    <button
                        class="btn btn-danger mt-3"
                        onclick="window.location.href='/login'">
                        Logout
                    </button>

                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
